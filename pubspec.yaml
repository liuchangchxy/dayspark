name: dayspark
description: DaySpark / 灵光 — AI-powered cross-platform calendar & todo app with CalDAV sync.
publish_to: 'none'
version: 0.13.0+9

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  cupertino_icons: ^1.0.8

  # Routing
  go_router: ^14.8.1

  # Database (Drift / SQLite)
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.30

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Persistence
  shared_preferences: ^2.5.3

  # Calendar UI
  intl: any

  # Recurring events (RRULE RFC 5545)
  rrule: ^0.2.18
  rrule_generator: ^0.9.8

  # File picker
  file_picker: ^9.2.1

  # HTTP client
  dio: ^5.8.0+1

  # Sharing / export
  share_plus: ^10.0.0

  # URL launcher
  url_launcher: ^6.3.0

  # CalDAV sync
  enough_icalendar: ^0.17.0
  xml: ^6.5.0

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: any

  # System alarm reminders
  alarm: ^5.1.5
  path: ^1.9.1
  path_provider: ^2.1.5
  drift_flutter: ^0.2.7
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.14
  drift_dev: ^2.24.0

  # Testing
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true