name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter analyze
      - run: flutter test

  build-web:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true
      - run: flutter pub get
      - run: flutter build web --release
      - run: cd build/web && zip -r $GITHUB_WORKSPACE/dayspark-web.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dayspark-web.zip

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Create DMG
        run: |
          APP="build/macos/Build/Products/Release/DaySpark.app"
          DMG="$GITHUB_WORKSPACE/dayspark-macos.dmg"
          hdiutil create -volname "DaySpark" -srcfolder "$APP" -ov -format UDZO "$DMG"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dayspark-macos.dmg

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/

  release:
    needs: [build-web, build-android, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare assets
        run: |
          mkdir -p release-assets
          cp artifacts/android-apk/app-release.apk release-assets/dayspark-android.apk
          cp artifacts/macos-dmg/dayspark-macos.dmg release-assets/
          cp artifacts/web-build/dayspark-web.zip release-assets/
          cd artifacts/windows-build && zip -r $GITHUB_WORKSPACE/release-assets/dayspark-windows.zip . && cd $GITHUB_WORKSPACE
          cd artifacts/linux-build && zip -r $GITHUB_WORKSPACE/release-assets/dayspark-linux.zip . && cd $GITHUB_WORKSPACE
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ !startsWith(github.ref_name, 'v1.') }}
          files: release-assets/*
          generate_release_notes: true
